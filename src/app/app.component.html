<div style="padding: 20px">
  <h1>BibleBetterAI</h1>
  <textarea #inputBox [(ngModel)]="userInput" placeholder="Ask a Bible question..."></textarea>
  <button (click)="sendToGemma(userInput)" [disabled]="loading">
    {{ loading ? 'Searching...' : 'Ask Gemma' }}
  </button>

  <div *ngIf="gemmaResponse" style="margin-top: 20px; white-space: pre-wrap">
    <strong>Response:</strong>
    <p>{{ gemmaResponse }}</p>
  </div>
</div>
