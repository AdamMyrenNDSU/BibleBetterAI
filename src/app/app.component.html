<div class="gemini-wrapper" [class.is-hero]="messages().length <= 1">
  <header class="chat-header">
    <span class="logo">BetterBibleAI</span>
  </header>

  <main class="chat-window">
    <div class="message-list" [class.is-thinking]="isTyping">
      <!-- ... (Your existing message loop) ... -->
      <div
        #messageRow
        *ngFor="let msg of messages(); let first = first"
        [ngClass]="[msg.role, first && messages().length === 1 ? 'hero-greeting' : '']"
        class="message-row"
      >
        <!-- ... -->
      </div>
    </div>
  </main>

  <footer class="input-container">
    <!-- ONLY show the input pill if NOT typing -->
    <div class="input-pill" *ngIf="!isTyping">
      <input
        [(ngModel)]="userInput"
        (keyup.enter)="send()"
        placeholder="Ask BetterBible anything..."
      />
      <button (click)="send()" [disabled]="!userInput.trim()">
        <svg viewBox="0 0 24 24" width="24" height="24">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" fill="currentColor" />
        </svg>
      </button>
    </div>

    <!-- SHOW the loading indicator or a placeholder when typing -->
    <div *ngIf="isTyping" class="typing-placeholder">
      <div class="loading-skeleton">
        <div class="skeleton-line"></div>
      </div>
      <span style="font-size: 12px; color: var(--text-sub); margin-top: 8px"
        >BB is searching the scriptures...</span
      >
    </div>

    <div class="footer-note">
      BetterBibleAI is a digital assistant and may provide inaccurate information.
    </div>
  </footer>
</div>
